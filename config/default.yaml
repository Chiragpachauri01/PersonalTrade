# PersonalTrade — committed defaults. Safe, conservative, PAPER mode.
# Override in config/local.yaml (git-ignored) or PT_* env vars
# (nested keys use __, e.g. PT_TRADING__MODE=paper).

trading:
  mode: paper                 # paper | live — the switch (ADR-008)
  live_orders_enabled: false  # second key of the two-key live gate
  universe: []                # instrument symbols, e.g. [RELIANCE, HDFCBANK]
  strategy: sma_crossover      # registry name (pt strategy list) — pt run trades this
  strategy_params: {}          # validated against the strategy's own params_schema
  interval: 1m                 # 1m | 15m — bar interval pt run aggregates ticks to

risk:
  capital: "500000"           # ₹, parsed as Decimal
  risk_per_trade_pct: "1.0"
  max_open_positions: 5
  max_daily_loss_pct: "3.0"
  kill_switch:
    max_consecutive_errors: 5

ai:
  enabled: true
  provider: anthropic
  model: claude-opus-4-8
  max_tokens_per_call: 2048
  daily_call_cap: 100
  monthly_usd_cap: "25"

data:
  candle_root: data/candles
  db_path: data/personaltrade.db

log:
  level: INFO
  format: json                # json | console (pretty, for dev)
  dir: data/logs

# Indian NSE equity cost stack (ADR-013). These are the commonly-cited defaults
# as of this writing — government/exchange rates and broker brokerage change
# periodically. Verify against your actual broker's rate card before trusting
# results beyond research/paper trading.
costs:
  brokerage_pct: "0.0003"              # 0.03% of turnover
  brokerage_max: "20"                  # flat cap per order, ₹
  stt_delivery_pct: "0.001"            # 0.1%, both legs
  stt_intraday_sell_pct: "0.00025"     # 0.025%, sell leg only
  exchange_txn_pct: "0.0000297"        # NSE approx
  sebi_pct: "0.000001"                 # ₹10 per crore
  stamp_duty_buy_delivery_pct: "0.00015"  # 0.015%, buy leg only
  stamp_duty_buy_intraday_pct: "0.00003"  # 0.003%, buy leg only
  gst_pct: "0.18"                      # on brokerage + exchange + SEBI only

backtest:
  slippage_bps: "5"            # adverse fill slippage vs next-bar open (Rule 12)
  default_segment: DELIVERY    # DELIVERY | INTRADAY

paper:
  slippage_bps: "5"            # adverse fill slippage vs current quote (Rule 12)
  segment: DELIVERY            # DELIVERY | INTRADAY
  latency_ms: 250               # simulated order-ack/fill delay

# News ingestion (ROADMAP M13). Free RSS sources — verified reachable/well-formed
# directly against the live feeds. Swap or add sources here; no code change needed.
news:
  sources:
    - name: economic_times_markets
      url: https://economictimes.indiatimes.com/markets/rssfeeds/1977021501.cms
    - name: livemint_markets
      url: https://www.livemint.com/rss/markets
  lookback_days: 2              # `pt news sync`'s default "since" window
  max_title_length: 300         # untrusted input — clamped before storage (Rule: treat as attacker input)
  max_body_length: 2000
  request_timeout_seconds: 15.0

# Recommendation Engine (ROADMAP M15): merges trading.strategy's deterministic
# signal with AI analysis (M14) into ranked, explained recommendations.
recommendation:
  interval: 1d                       # candle interval the screener reads
  veto_conviction_threshold: high    # AI must reach this conviction to veto a BUY/SELL

# Local web dashboard (ROADMAP M16). Localhost-first — never bind host to
# 0.0.0.0 without a VPN/reverse-proxy in front of it (ADR-026).
dashboard:
  host: 127.0.0.1
  port: 8000
  poll_interval_seconds: 3.0

# Live Upstox Broker (ROADMAP M17, ADR-027). Only reached when trading.mode:
# live AND trading.live_orders_enabled: true (ADR-008's two-key gate,
# enforced in the risk engine) — these settings tune the connection, not the
# gate itself.
upstox:
  segment: DELIVERY                  # DELIVERY | INTRADAY
  request_timeout_seconds: 15.0
  max_retries: 3                     # backoff retries on 429/5xx per call
  position_mismatch_kill_threshold_qty: 5  # reconciliation: trip kill switch above this
