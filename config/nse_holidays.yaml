# NSE trading holidays (equity segment). Source: NSE holiday circulars — refresh annually.
#
# An incomplete list only degrades missing-day *warnings* in data-quality reports;
# it never affects stored data. Weekends are handled automatically.
#
# 2026 movable holidays through June were derived empirically (2026-07-19): dates
# absent from BOTH RELIANCE and INFY daily series = exchange-wide closures.
# TODO(annual): add H2-2026 movable holidays from the NSE circular
# (Ganesh Chaturthi, Dussehra, Diwali, Gurpurab).
